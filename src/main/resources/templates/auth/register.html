<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Đăng ký</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><header>Đăng ký</header><main><form th:action="@{/register}" method="post" th:object="${registerRequest}" class="grid"><input type="text" th:field="*{fullName}" placeholder="Họ tên" required><input type="email" th:field="*{email}" placeholder="Email" required><input type="password" th:field="*{password}" placeholder="Mật khẩu" required><button type="submit">Tạo tài khoản</button></form><p th:if="${error}" th:text="${error}"></p><p th:if="${success}" th:text="${success}"></p><a th:href="@{/login}">Quay lại đăng nhập</a></main></body></html>
